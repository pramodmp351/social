<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Stackly - Image Feed</title>
    <style>
      :root {
        --primary-purple: #5f259f; /* PhonePe Primary */
        --secondary-blue: #2563eb;
        --hover-blue: #e0e7ff;
        --bg-white: #ffffff;
        --bg-light: #f9f9f9;
        --text-dark: #333333;
        --text-gray: #606060;
        --border-color: #e5e7eb;
        --sidebar-width: 240px;
        --navbar-height: 56px;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Roboto", Arial, sans-serif;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        background-color: var(--bg-white);
        color: var(--text-dark);
        overflow-x: hidden;
      }

      /* --- Navbar --- */
      nav {
        position: fixed;
        top: 0;
        width: 100%;
        height: var(--navbar-height);
        background: var(--bg-white);
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 16px;
        z-index: 1001;
        border-bottom: 1px solid var(--border-color);
      }

      .nav-left {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .menu-icon {
        padding: 8px;
        cursor: pointer;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .menu-icon:hover {
        background-color: var(--hover-blue);
      }

      .logo {
        display: flex;
        align-items: center;
        font-weight: bold;
        font-size: 18px;
        letter-spacing: -0.5px;
        color: var(--primary-purple);
        cursor: pointer;
      }

      .logo-icon {
        background-color: var(--primary-purple);
        color: white;
        padding: 2px 6px;
        border-radius: 4px;
        margin-right: 4px;
        font-size: 14px;
      }

      .nav-center {
        flex: 0 1 600px;
        display: flex;
        align-items: center;
        margin: 0 16px;
      }

      .search-container {
        display: flex;
        width: 100%;
        border: 1px solid var(--border-color);
        border-radius: 40px 0 0 40px;
        overflow: hidden;
        background: #fff;
      }

      .search-container input {
        width: 100%;
        padding: 8px 16px;
        border: none;
        outline: none;
        font-size: 16px;
      }

      .search-btn {
        background-color: #f8f8f8;
        border: 1px solid var(--border-color);
        border-left: none;
        padding: 0 20px;
        border-radius: 0 40px 40px 0;
        cursor: pointer;
      }

      .mic-icon {
        background-color: #f8f8f8;
        padding: 8px;
        border-radius: 50%;
        margin-left: 8px;
        cursor: pointer;
        display: flex;
        align-items: center;
      }

      .nav-right {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .nav-right i {
        font-size: 20px;
        cursor: pointer;
        color: var(--primary-purple);
      }

      .login-btn {
        border: 1px solid var(--primary-purple);
        color: var(--primary-purple);
        padding: 6px 10px;
        border-radius: 20px;
        font-weight: 500;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 4px;
        white-space: nowrap;
        font-size: 13px;
      }

      /* --- Sidebar (Drawer) --- */
      .sidebar {
        position: fixed;
        top: 0; /* Changed to 0 for full height drawer on mobile */
        left: 0;
        width: var(--sidebar-width);
        height: 100vh;
        background: var(--bg-white);
        overflow-y: auto;
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 1005;
        padding-top: 12px;
        box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
        transform: translateX(-100%);
      }

      .sidebar.active {
        transform: translateX(0);
      }

      .sidebar-header {
        display: none; /* Only visible in mobile drawer mode */
        padding: 0 16px 16px 16px;
        align-items: center;
        gap: 16px;
      }

      .sidebar-item {
        display: flex;
        align-items: center;
        padding: 12px 24px;
        cursor: pointer;
        border-radius: 10px;
        margin: 0 12px;
        color: var(--text-dark);
        text-decoration: none;
        font-size: 14px;
      }

      .sidebar-item:hover {
        background-color: var(--hover-blue);
      }

      .sidebar-item.active {
        background-color: #f2f2f2;
        font-weight: bold;
      }

      .sidebar-item i {
        margin-right: 24px;
        font-size: 20px;
        width: 24px;
        text-align: center;
        color: var(--primary-purple);
      }

      .sidebar-divider {
        height: 1px;
        background-color: var(--border-color);
        margin: 12px 0;
      }

      /* --- Main Content --- */
      .main-container {
        margin-top: var(--navbar-height);
        margin-left: 0; /* Default for mobile/collapsed */
        padding: 0 0 24px 0;
        transition: margin-left 0.3s ease;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      /* Chips Bar */
      .chips-wrapper {
        position: sticky;
        top: var(--navbar-height);
        background: white;
        z-index: 998;
        width: 100%;
        border-bottom: 1px solid var(--border-color);
        padding: 12px 0;
      }

      .chips-container {
        display: flex;
        gap: 12px;
        overflow-x: auto;
        white-space: nowrap;
        padding: 0 16px;
        scrollbar-width: none;
      }

      .chips-container::-webkit-scrollbar {
        display: none;
      }

      .chip {
        background-color: #f2f2f2;
        padding: 6px 12px;
        border-radius: 8px;
        font-size: 14px;
        cursor: pointer;
        transition: background 0.2s;
        border: 1px solid transparent;
        flex-shrink: 0;
      }

      .chip.active {
        background-color: var(--primary-purple);
        color: white;
      }

      /* Single Post Feed */
      .post-grid {
        display: flex;
        flex-direction: column;
        gap: 24px;
        margin-top: 16px;
        width: 100%;
        max-width: 600px;
      }

      .post-card {
        /* cursor: pointer; */
        width: 100%;
      }

      .thumbnail-box {
        position: relative;
        width: 100%;
        aspect-ratio: 16/9;
        overflow: hidden;
        background: #eee;
      }

      /* Rounded corners only on tablet/desktop */
      @media (min-width: 600px) {
        .thumbnail-box {
          border-radius: 12px;
        }
        .post-card {
          padding: 0 16px;
        }
      }

      .thumbnail-box img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .post-info {
        display: flex;
        margin-top: 12px;
        padding: 0 12px;
        gap: 12px;
      }

      .channel-avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        overflow: hidden;
        flex-shrink: 0;
      }

      .channel-avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .post-details {
        flex-grow: 1;
      }

      .post-title {
        font-size: 16px;
        font-weight: 500;
        line-height: 1.3;
        margin-bottom: 4px;
        color: var(--text-dark);
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .meta-text {
        font-size: 13px;
        color: var(--text-gray);
        line-height: 1.4;
      }

      /* Interaction Bar */
      .interaction-bar {
        display: flex;
        gap: 12px;
        margin-top: 12px;
        padding: 12px 12px 0 12px;
        border-top: 1px solid #f0f0f0;
      }

      .action-btn {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        background: #f2f2f2;
        border: none;
      }

      .action-btn.active {
        color: var(--secondary-blue);
        background: var(--hover-blue);
      }

      .subscribe-btn {
        margin-left: auto;
        background: var(--primary-purple);
        color: white;
        padding: 6px 14px;
      }

      .subscribe-btn.subscribed {
        background: #eee;
        color: #606060;
      }

      /* Pagination */
      .pagination {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 12px;
        margin: 32px 0;
        width: 100%;
        padding: 0 16px;
      }

      .page-btn {
        padding: 8px 16px;
        border: 1px solid var(--primary-purple);
        background: transparent;
        color: var(--primary-purple);
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
        font-weight: bold;
        flex: 1;
        max-width: 120px;
        text-align: center;
      }

      .page-btn:disabled {
        border-color: #ccc;
        color: #ccc;
      }

      /* Mobile Overlay */
      .sidebar-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: 1004;
        opacity: 0;
        transition: opacity 0.3s ease;
      }

      .sidebar-overlay.active {
        display: block;
        opacity: 1;
      }

      /* Desktop specific sidebar logic */
      @media (min-width: 993px) {
        .sidebar {
          top: var(--navbar-height);
          height: calc(100vh - var(--navbar-height));
          transform: translateX(0);
          box-shadow: none;
          border-right: 1px solid var(--border-color);
        }
        .sidebar.collapsed {
          transform: translateX(-100%);
        }
        .main-container {
          margin-left: var(--sidebar-width);
        }
        .main-container.full {
          margin-left: 0;
        }
      }

      /* Mobile Adjustments */
      @media (max-width: 768px) {
        .nav-center {
          display: none;
        }
        .sidebar-header {
          display: flex;
        }
        .nav-right i[data-lucide="video"] {
          display: none;
        }
        .post-title {
          font-size: 15px;
        }
      }

      @media (max-width: 400px) {
        .nav-right {
          gap: 8px;
        }
        .login-btn span {
          display: none;
        }
        .login-btn {
          padding: 6px;
          border-radius: 50%;
        }
      }
      /* --- Footer --- */
.footer {
  width: 100%;
  border-top: 1px solid var(--border-color);
  background: var(--primary-purple);
  margin-top: 30px;
}

.footer-inner {
  max-width: 900px;
  margin: auto;
  padding: 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
  font-size: 13px;
  color: var(--text-gray);
}

.footer-logo img {
  height: 70px;
  width: auto;
  cursor: pointer;
}

.footer-links {
  display: flex;
  gap: 16px;
}

.footer-links a {
  text-decoration: none;
  color: var(--bg-white);
  font-weight: 800;
}

.footer-links a:hover {
  text-decoration: underline;
}

.footer-copy {
  width: 100%;
  text-align: center;
  margin-top: 6px;
  font-size: 12px;
  color: var(--text-gray);
}

/* Mobile */
@media (max-width: 600px) {
  .footer-inner {
    flex-direction: column;
    text-align: center;
  }

  .footer-links {
    justify-content: center;
  }
}
    </style>
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body>
    <nav>
      <div class="nav-left">
        <div class="menu-icon" id="menuBtn">
          <i data-lucide="menu"></i>
        </div>
        <div class="logo">
          <span
            class="logo-icon"
            onclick="window.location.href = './home2.html'"
            >S</span
           onclick="window.location.href = './home2.html'">
          Stackly
        </div>
      </div>
      <div class="nav-center">
        <div class="search-container">
          <input type="text" id="searchInput" placeholder="Search posts..." />
          <button class="search-btn" id="searchBtn">
            <i data-lucide="search"></i>
          </button>
        </div>
        <div class="mic-icon">
          <i data-lucide="mic"></i>
        </div>
      </div>
      <div class="nav-right">
        <i data-lucide="video" style="cursor: pointer;" onclick="window.location.href='./4042.html'"></i>
        <i data-lucide="bell" style="cursor: pointer;" onclick="window.location.href='./4042.html'"></i>
        <div class="login-btn" >
          <i data-lucide="user-circle" onclick="window.location.href='./4042.html'"></i> <span  onclick="window.location.href='./4042.html'" >Account</span>
        </div>
      </div>
    </nav>

    <div class="sidebar-overlay" id="overlay"></div>

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="menu-icon" id="closeMenuBtn">
          <i data-lucide="x"></i>
        </div>
        <div class="logo"><span class="logo-icon">S</span> Stackly</div>
      </div>
      <a href="./home2.html" class="sidebar-item active">
        <i data-lucide="home"></i> Home
      </a>
      <a href="./index.html" class="sidebar-item">
        <i data-lucide="compass"></i> Home1
      </a>
      <a href="./4042.html" class="sidebar-item">
        <i data-lucide="play-square"></i> Subscriptions
      </a>
      <div class="sidebar-divider"></div>
      <a href="./4042.html" class="sidebar-item">
        <i data-lucide="library"></i> Library
      </a>
      <a href="./4042.html" class="sidebar-item">
        <i data-lucide="history"></i> History
      </a>
      <a href="./4042.html" class="sidebar-item">
        <i data-lucide="thumbs-up"></i> Liked Posts
      </a>
      <div class="sidebar-divider"></div>
      <a href="./4042.html" class="sidebar-item">
        <i data-lucide="settings"></i> Settings
      </a>
      <a href="./4042.html" class="sidebar-item">
        <i data-lucide="help-circle"></i> Help
      </a>
    </aside>

    <main class="main-container" id="mainContent">
      <div class="chips-wrapper">
        <div class="chips-container" id="chips">
          <div class="chip active" data-category="All">All</div>
          <div class="chip" data-category="Programming">Programming</div>
          <div class="chip" data-category="Gaming">Gaming</div>
          <div class="chip" data-category="Technology">Technology</div>
          <div class="chip" data-category="Design">Design</div>
          <div class="chip" data-category="AI">AI</div>
          <div class="chip" data-category="Nature">Nature</div>
          <div class="chip" data-category="Art">Art</div>
          <div class="chip" data-category="News">News</div>
        </div>
      </div>

      <div class="post-grid" id="postGrid"></div>

      <div class="pagination">
        <button class="page-btn" id="prevBtn" disabled>Prev</button>
        <span id="pageInfo" style="font-size: 13px; color: var(--text-gray)"
          >Page 1</span
        >
        <button class="page-btn" id="nextBtn">Next</button>
      </div>
      <footer class="footer">
  <div class="footer-inner">

    <div class="footer-logo">
      <img src="./assets/logo.webp" alt="Stackly Logo" onclick="window.location.href='./home2.html'">
    </div>

    <div class="footer-links">
      <a href="./4042">Privacy Policy</a>
      <a href="./4042">Terms & Conditions</a>
    </div>

    <div class="footer-copy">
      © 2026 Stackly. All rights reserved.
    </div>

  </div>
</footer>
    </main>

    <script>
      const categories = [
        "Programming",
        "Gaming",
        "Technology",
        "Design",
        "AI",
        "Nature",
        "Art",
        "News",
      ];
      const channels = [
        "CodeWithMe",
        "GamerPro",
        "TechDaily",
        "PixelPerfect",
        "FutureAI",
        "WildWorld",
        "ArtistSoul",
        "GlobalNews",
      ];

      let allPosts = [];

for (let i = 1; i <= 60; i++) {
  const cat = categories[Math.floor(Math.random() * categories.length)];
  const ch = channels[Math.floor(Math.random() * channels.length)];

  allPosts.push({
    id: i,
    title: `${cat}: Why this matters in 2024 and beyond. A deep dive into the trends of ${cat.toLowerCase()}.`,
    channelName: ch,
    views: (Math.random() * 900 + 10).toFixed(1) + "K views",
    time: Math.floor(Math.random() * 20 + 1) + "h ago",

    // POST IMAGES
    thumbnail: `./assets/post${(i % 20) + 1}.webp`,

    // CHANNEL PROFILE IMAGES
    avatar: `./assets/ch${(i % 10) + 1}.webp`,

    category: cat,
  });
}

      let filteredPosts = [...allPosts];
      let currentPage = 1;
      const postsPerPage = 10;
      let activeCategory = "All";

      const postGrid = document.getElementById("postGrid");
      const searchInput = document.getElementById("searchInput");
      const sidebar = document.getElementById("sidebar");
      const mainContent = document.getElementById("mainContent");
      const overlay = document.getElementById("overlay");
      const pageInfo = document.getElementById("pageInfo");

      function renderPosts() {
        const start = (currentPage - 1) * postsPerPage;
        const end = start + postsPerPage;
        const currentPosts = filteredPosts.slice(start, end);

        postGrid.innerHTML = "";

        if (currentPosts.length === 0) {
          postGrid.innerHTML =
            '<div style="text-align: center; padding: 40px; color: #666;">No results found.</div>';
          return;
        }

        currentPosts.forEach((post) => {
          const card = document.createElement("div");
          card.className = "post-card";
          card.innerHTML = `
                    <div class="thumbnail-box">
                        <img src="${post.thumbnail}" loading="lazy" alt="Thumb">
                    </div>
                    <div class="post-info">
                        <div class="channel-avatar">
                            <img src="${post.avatar}" alt="Ch">
                        </div>
                        <div class="post-details">
                            <h3 class="post-title">${post.title}</h3>
                            <p class="meta-text">${post.channelName}</p>
                            <p class="meta-text">${post.views} • ${post.time}</p>
                        </div>
                    </div>
                    <div class="interaction-bar">
                        <button class="action-btn like-btn">
                            <i data-lucide="thumbs-up" style="width: 14px"></i> <span>Like</span>
                        </button>
                        <button class="action-btn">
                            <i data-lucide="share-2" style="width: 14px"  onclick="window.location.href='./4042.html'"></i> <span  onclick="window.location.href='./4042.html'">Share</span>
                        </button>
                        <button class="action-btn subscribe-btn">Subscribe</button>
                    </div>
                `;
          postGrid.appendChild(card);
        });

        lucide.createIcons();
        updatePagination();

        // Interaction listeners
        document.querySelectorAll(".like-btn").forEach((btn) => {
          btn.onclick = () => btn.classList.toggle("active");
        });
        document.querySelectorAll(".subscribe-btn").forEach((btn) => {
          btn.onclick = () => {
            btn.classList.toggle("subscribed");
            btn.textContent = btn.classList.contains("subscribed")
              ? "Subscribed"
              : "Subscribe";
          };
        });
      }

      function updatePagination() {
        const totalPages = Math.ceil(filteredPosts.length / postsPerPage);
        pageInfo.innerText = `Page ${currentPage} of ${totalPages || 1}`;
        document.getElementById("prevBtn").disabled = currentPage === 1;
        document.getElementById("nextBtn").disabled = currentPage >= totalPages;
      }

      function filterData() {
        const query = searchInput.value.toLowerCase();
        filteredPosts = allPosts.filter((post) => {
          const matchesSearch =
            post.title.toLowerCase().includes(query) ||
            post.channelName.toLowerCase().includes(query);
          const matchesCategory =
            activeCategory === "All" || post.category === activeCategory;
          return matchesSearch && matchesCategory;
        });
        currentPage = 1;
        renderPosts();
      }

      // Sidebar logic
      const toggleSidebar = () => {
        const isMobile = window.innerWidth <= 992;
        if (isMobile) {
          sidebar.classList.toggle("active");
          overlay.classList.toggle("active");
        } else {
          sidebar.classList.toggle("collapsed");
          mainContent.classList.toggle("full");
        }
      };

      document.getElementById("menuBtn").onclick = toggleSidebar;
      document.getElementById("closeMenuBtn").onclick = toggleSidebar;
      overlay.onclick = toggleSidebar;

      document.getElementById("searchBtn").onclick = filterData;
      searchInput.onkeyup = (e) => e.key === "Enter" && filterData();

      document.getElementById("chips").onclick = (e) => {
        if (e.target.classList.contains("chip")) {
          document
            .querySelectorAll(".chip")
            .forEach((c) => c.classList.remove("active"));
          e.target.classList.add("active");
          activeCategory = e.target.dataset.category;
          filterData();
        }
      };

      document.getElementById("prevBtn").onclick = () => {
        if (currentPage > 1) {
          currentPage--;
          renderPosts();
          window.scrollTo(0, 0);
        }
      };
      document.getElementById("nextBtn").onclick = () => {
        const totalPages = Math.ceil(filteredPosts.length / postsPerPage);
        if (currentPage < totalPages) {
          currentPage++;
          renderPosts();
          window.scrollTo(0, 0);
        }
      };

      // Initialize
      renderPosts();
    </script>
  </body>
</html>
