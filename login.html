<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Streamit - Login</title>
    <style>
      /* Base Reset */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }

      body,
      html {
        height: 100%;
        overflow: hidden;
        background-color: #000;
      }

      /* Diagonal Background Grid */
      .bg-container {
        position: fixed;
        top: -20%;
        left: -10%;
        width: 120%;
        height: 140%;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 15px;
        transform: rotate(-10deg);
        z-index: 1;
        filter: brightness(0.4) blur(2px);
      }

      .poster {
        width: 100%;
        height: 350px;
        background-size: cover;
        background-position: center;
        border-radius: 8px;
        background-color: #1a1a1a;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
      }

      /* Overlay to darken and add depth */
      .overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(
          circle,
          rgba(0, 0, 0, 0.3) 0%,
          rgba(0, 0, 0, 0.8) 100%
        );
        z-index: 2;
      }

      /* Main Wrapper */
      .main-wrapper {
        position: relative;
        z-index: 10;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        width: 100%;
        padding: 20px;
      }

      /* Glassmorphism Login Card */
      .login-card {
        background: rgba(15, 15, 15, 0.75);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        width: 100%;
        max-width: 450px;
        padding: 40px;
        border-radius: 4px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        text-align: left;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
      }

      /* Logo Styling */
      .logo {
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 30px;
        color: #fff;
        font-weight: 700;
        font-size: 24px;
        letter-spacing: 1px;
      }

      .logo .s-char {
        color: #e50914;
        font-size: 38px;
        margin-right: 5px;
        font-family: "Georgia", serif; /* Making it more stylized */
      }

      /* Form Elements */
      .form-group {
        margin-bottom: 20px;
        position: relative;
      }

      label {
        display: block;
        color: #ccc;
        font-size: 14px;
        margin-bottom: 8px;
      }

      label span {
        color: #e50914;
      }

      input[type="text"],
      input[type="password"] {
        width: 100%;
        padding: 12px 15px;
        background: #111;
        border: 1px solid #333;
        color: #fff;
        border-radius: 4px;
        outline: none;
        transition:
          border 0.3s,
          box-shadow 0.3s;
      }

      input:focus {
        border-color: #e50914;
        box-shadow: 0 0 8px rgba(229, 9, 20, 0.3);
      }

      /* Password Toggle Icon */
      .toggle-password {
        position: absolute;
        right: 15px;
        top: 38px;
        cursor: pointer;
        color: #888;
        font-size: 14px;
      }

      /* Remember Me Row */
      .options-row {
        display: flex;
        align-items: center;
        margin-bottom: 25px;
      }

      .options-row input[type="checkbox"] {
        accent-color: #e50914;
        margin-right: 10px;
        width: 16px;
        height: 16px;
        cursor: pointer;
      }

      .options-row label {
        margin-bottom: 0;
        cursor: pointer;
      }

      /* Login Button */
      .login-btn {
        width: 100%;
        padding: 14px;
        background: linear-gradient(to right, #e50914, #b20710);
        color: #fff;
        border: none;
        border-radius: 4px;
        font-weight: 600;
        font-size: 16px;
        cursor: pointer;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
        transition:
          transform 0.2s,
          filter 0.2s;
        margin-bottom: 20px;
      }

      .login-btn:hover {
        filter: brightness(1.1);
      }

      .login-btn:active {
        transform: scale(0.98);
      }

      .check-icon {
        font-size: 18px;
      }

      /* Footer Links */
      .signup-text {
        text-align: center;
        color: #fff;
        font-size: 14px;
      }

      .signup-text a {
        color: #e50914;
        text-decoration: none;
        font-weight: 600;
        margin-left: 5px;
      }

      .signup-text a:hover {
        text-decoration: underline;
      }

      /* Feedback Floating Button */
      .feedback-btn {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: #e50914;
        color: white;
        padding: 10px 18px;
        border-radius: 4px;
        font-size: 13px;
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        z-index: 100;
      }

      /* Responsive adjustments */
      @media (max-width: 480px) {
        .login-card {
          padding: 30px 20px;
        }
        .bg-container {
          grid-template-columns: repeat(2, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <!-- Background Grid -->
    <div class="bg-container" id="bgGrid">
      <!-- Posters will be generated by JS -->
    </div>

    <!-- Overlay Layer -->
    <div class="overlay"></div>

    <!-- Main Content -->
    <div class="main-wrapper">
      <div class="login-card">
        <!-- Brand -->
        <div class="logo"><span class="s-char">S</span> STACKLY</div>

        <!-- Form -->
        <form id="loginForm" action="./404.html">
          <div class="form-group">
            <label for="username"
              >Username or Email Address <span>*</span></label
            >
            <input type="text" id="username" placeholder="enter username" />
          </div>

          <div class="form-group">
            <label for="password">Password <span>*</span></label>
            <input
              type="password"
              id="password"
              required
              placeholder="enter password"
            />
            <span class="toggle-password" onclick="togglePassword()">
              <svg
                id="eye-icon"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </span>
          </div>

          <div class="options-row">
            <input type="checkbox" id="remember" checked />
            <label for="remember">Remember Me</label>
          </div>

          <button type="submit" class="login-btn">
            Login. <span class="check-icon">✓</span>
          </button>
          <div class="signup-text">
            <a href="./404.html">Forgot password?</a>
          </div>
          <div class="signup-text">
            If You are new? <a href="./signup.html">Sign Up</a>
          </div>
        </form>
      </div>
    </div>

    <!-- Floating Feedback -->
    <!-- <div class="feedback-btn">
      <svg
        width="16"
        height="16"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
      >
        <path
          d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"
        ></path>
      </svg>
      Feedback
    </div> -->

    <script>
      // Generate Dynamic Posters for Background
      const grid = document.getElementById("bgGrid");
      const posterCount = 24;

      // Mock poster colors/gradients since we can't load external images reliably without URLs
      // We use various movie-themed linear gradients to mimic a high-end UI
      const themes = [
        'linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url("https://images.unsplash.com/photo-1536440136628-849c177e76a1?auto=format&fit=crop&w=400&q=80")',
        'linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url("https://images.unsplash.com/photo-1626814026160-2237a95fc5a0?auto=format&fit=crop&w=400&q=80")',
        'linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url("https://images.unsplash.com/photo-1594908900066-3f47337549d8?auto=format&fit=crop&w=400&q=80")',
        'linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url("https://images.unsplash.com/photo-1485846234645-a62644f84728?auto=format&fit=crop&w=400&q=80")',
        'linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url("https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?auto=format&fit=crop&w=400&q=80")',
        'linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url("https://images.unsplash.com/photo-1440404653325-ab127d49abc1?auto=format&fit=crop&w=400&q=80")',
      ];

      for (let i = 0; i < posterCount; i++) {
        const div = document.createElement("div");
        div.className = "poster";
        div.style.backgroundImage = themes[i % themes.length];
        grid.appendChild(div);
      }

      // Toggle Password Visibility
      function togglePassword() {
        const passwordField = document.getElementById("password");
        const eyeIcon = document.getElementById("eye-icon");

        if (passwordField.type === "password") {
          passwordField.type = "text";
          eyeIcon.style.color = "#e50914";
        } else {
          passwordField.type = "password";
          eyeIcon.style.color = "#888";
        }
      }

      // Handle Form Submit
      //   document.getElementById("loginForm").addEventListener("submit", (e) => {
      //     e.preventDefault();
      //     const btn = document.querySelector(".login-btn");
      //     btn.innerHTML = "Signing in...";
      //     setTimeout(() => {
      //       btn.innerHTML = "Welcome Back! ✓";
      //       btn.style.background = "#28a745";
      //     }, 1000);
      //   });
    </script>
  </body>
</html>
