<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stackly | 404</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Arial, sans-serif;
      }

      body {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
        overflow: hidden;
      }

      /* Background */
      .bg {
        position: fixed;
        top: -20%;
        left: -10%;
        width: 120%;
        height: 140%;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 15px;
        transform: rotate(-10deg);
        filter: brightness(0.35) blur(3px);
        z-index: 1;
      }

      .poster {
        height: 350px;
        border-radius: 10px;
        background-size: cover;
        background-position: center;
        background-color: #1a1a1a;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
      }

      /* overlay */
      .overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(
          circle,
          rgba(0, 0, 0, 0.2) 0%,
          rgba(0, 0, 0, 0.9) 100%
        );
        z-index: 2;
      }

      /* card */
      .card {
        position: relative;
        z-index: 10;
        background: rgba(10, 10, 15, 0.85);
        backdrop-filter: blur(14px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        width: 420px;
        padding: 45px 40px;
        border-radius: 12px;
        text-align: center;
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
      }

      /* logo */
      .logo {
        color: #6b4dfc;
        font-weight: 700;
        font-size: 24px;
        letter-spacing: 2px;
        margin-bottom: 25px;
      }

      .logo span {
        font-size: 42px;
        font-family: Georgia, serif;
        margin-right: 6px;
      }

      /* 404 */
      .code {
        font-size: 90px;
        font-weight: 800;
        color: #6b4dfc;
        text-shadow:
          0 0 10px rgba(107, 77, 252, 0.6),
          0 0 30px rgba(107, 77, 252, 0.5);
        margin-bottom: 10px;
      }

      /* text */
      .title {
        color: #fff;
        font-size: 22px;
        font-weight: 600;
        margin-bottom: 12px;
      }

      .desc {
        color: #aaa;
        font-size: 14px;
        line-height: 1.6;
        margin-bottom: 30px;
      }

      /* button */
      .btn {
        display: inline-block;
        padding: 14px 28px;
        border-radius: 8px;
        font-weight: 600;
        font-size: 15px;
        color: white;
        border: none;
        cursor: pointer;

        background: linear-gradient(135deg, #6b4dfc, #2563eb);
        box-shadow: 0 5px 18px rgba(37, 99, 235, 0.4);

        transition: all 0.3s ease;
      }

      .btn:hover {
        transform: translateY(-2px);
        filter: brightness(1.15);
        box-shadow: 0 8px 25px rgba(37, 99, 235, 0.6);
      }
    </style>
  </head>

  <body>
    <div class="bg" id="bg"></div>
    <div class="overlay"></div>

    <div class="card">
      <div class="logo"><span>S</span>STACKLY</div>

      <div class="code">404</div>

      <div class="title">Oops! Page Not Found</div>

      <div class="desc">
        The page you're looking for doesn't exist. It may have been moved,
        deleted, or the URL might be incorrect.
      </div>

      <button class="btn" onclick="window.location.href = './home2.html'">
        Go Back Home
      </button>
    </div>

    <script>
      /* background posters */
      const bg = document.getElementById("bg");

      for (let i = 1; i <= 20; i++) {
        const div = document.createElement("div");
        div.className = "poster";

        div.style.backgroundImage = `url(https://picsum.photos/400/600?random=${i})`;

        bg.appendChild(div);
      }
    </script>
  </body>
</html>
